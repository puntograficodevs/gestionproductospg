<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/mostrar-productos.css}"/>
    <title>Orden de Trabajo - Punto Gráfico</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div th:replace="fragments/instruccion-impresion :: instruccion-impresion"></div>

<div class="card mb-3 border contenedor-orden-impresion" th:fragment="detalle-orden">

    <th:block th:with="ordenCorrecta=${ordenTrabajo ?: orden}, itemCorrecto=${item ?: (ordenTrabajo ?: orden).items[0]}">

        <div class="row align-items-center">
            <div class="col d-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="#e83e8c" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                    <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0m-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
                </svg>
                <h4 class="mb-0">Orden #<span th:text="${ordenCorrecta.id}"></span> - <span class="capitalize" th:text="${itemCorrecto.producto.nombre}"></span></h4>
            </div>

            <div class="col-3 text-end">
                <img th:src="@{/img/logotipo-color.png}" class="img-fluid" style="max-height: 60px;" />
            </div>
        </div>

        <div class="row" th:if="${ordenCorrecta.correccion != null && ordenCorrecta.correccion != ''}">
            <div class="col-12">
                <div class="card mb-3 border contenedor-datos-orden-impresion contenedor-correccion-odt">
                    <h6 class="titulo-correccion">Corrección pendiente</h6>
                    <hr class="divider">
                    <p class="texto-correccion" th:text="${ordenCorrecta.correccion}"></p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-6">
                <div class="card mb-3 border contenedor-datos-orden-impresion">
                    <h6>Datos del cliente</h6>
                    <hr class="divider">
                    <p><strong>Cliente: </strong><span th:text="${ordenCorrecta.nombreCliente}"></span></p>
                    <p><strong>Teléfono: </strong><span th:text="${ordenCorrecta.telefonoCliente}"></span></p>
                    <p><strong>Cuenta corriente: </strong><span th:text="${ordenCorrecta.esCuentaCorriente} ? 'Sí' : 'No'"></span></p>
                </div>
                <div class="card mb-3 border contenedor-datos-orden-impresion">
                    <h6>Datos del pago</h6>
                    <hr class="divider">
                    <p><strong>Pedido: </strong><span th:text="${#temporals.format(ordenCorrecta.fechaPedido, 'dd/MM/yyyy')}"></span></p>
                    <p><strong>Total: </strong>$<span th:text="${ordenCorrecta.total}"></span></p>
                    <p><strong>Abonado: </strong>$<span th:text="${ordenCorrecta.abonado}"></span></p>
                    <p><strong>Factura: </strong><span th:text="${ordenCorrecta.necesitaFactura} ? 'Sí' : 'No'"></span></p>
                    <p><strong>Vendedor/a: </strong><span th:text="${ordenCorrecta.empleado.nombre}"></span></p>
                </div>
            </div>

            <div class="col-6">
                <div class="card mb-3 border contenedor-datos-orden-impresion">
                    <h6>Datos del producto</h6>
                    <hr class="divider">

                    <div th:if="${itemCorrecto.detallesMap != null}">
                        <div th:each="entry : ${itemCorrecto.detallesMap}">
                            <th:block th:if="${entry.key != 'cantidad_producto'}">
                                <p>
                                    <strong th:text="${#strings.capitalize(#strings.replace(entry.key, '_', ' '))} + ': '"></strong>
                                    <span th:text="${entry.value}"></span>
                                </p>
                            </th:block>
                        </div>
                    </div>

                    <hr class="divider">
                    <p><strong>Fecha de entrega: </strong><span th:text="${#temporals.format(ordenCorrecta.fechaEntrega, 'dd/MM/yyyy')}"></span></p>
                    <p th:if="${ordenCorrecta.horaEntrega != null && ordenCorrecta.horaEntrega != ''}"><strong>Hora: </strong><span th:text="${ordenCorrecta.horaEntrega}"></span> hs.</p>
                    <p th:if="${ordenCorrecta.fechaMuestra}"><strong>Muestra: </strong><span th:text="${#temporals.format(ordenCorrecta.fechaMuestra, 'dd/MM/yyyy')}"></span></p>

                    <p><strong>Cantidad: </strong><span th:text="${itemCorrecto.cantidad}"></span></p>
                </div>
            </div>
        </div>

        <div class="col-12">
            <div class="card mb-3 border contenedor-datos-orden-impresion contenedor-precio-restante-orden-impresion">
                <p class="pago-restante d-flex justify-content-center align-items-center mb-0">
                    Restante: $<span th:text="${ordenCorrecta.total - ordenCorrecta.abonado}"></span>
                </p>
            </div>
        </div>
        <div th:replace="fragments/footer-odt :: footer-odt"></div>

        <div th:if="${ordenCorrecta.estadoOrden?.id == 4 and (session.empleadoLogueado?.rol?.id == 1 or session.empleadoLogueado?.rol?.id == 2)}" class="modal-footer mt-3">
            <a th:href="@{/ordenes/editar-orden/{id}(id=${ordenCorrecta.id})}" class="btn btn-warning w-100 shadow-sm">
                <strong>Corregir ahora</strong>
            </a>
        </div>
    </th:block>
</div>



</body>
</html>
