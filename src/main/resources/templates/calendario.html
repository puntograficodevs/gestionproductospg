<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Calendario de Trabajo - Punto Gráfico</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/root.css}"/>
    <link rel="stylesheet" th:href="@{/css/calendario.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container-fluid mt-3">
    <div class="card shadow-sm mb-2">
        <div class="card-body d-flex justify-content-between align-items-center py-2">
            <div class="d-flex align-items-center">
                <a th:href="@{/ordenes/calendario(tipo=${tipoActual}, lunes=${semanaPrevia})}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-chevron-left"></i>
                </a>
                <h5 class="mb-0 mx-3 fw-bold">
                    Semana del <span th:text="${#temporals.format(lunesActual, 'dd/MM/yyyy')}"></span>
                </h5>
                <a th:href="@{/ordenes/calendario(tipo=${tipoActual}, lunes=${semanaSiguiente})}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-chevron-right"></i>
                </a>
            </div>

            <div class="btn-group">
                <a th:href="@{/ordenes/calendario(tipo='entrega', lunes=${lunesActual})}"
                   th:classappend="${tipoActual == 'entrega' ? 'active' : ''}"
                   class="btn btn-outline-primary">Ver Entregas</a>
                <a th:href="@{/ordenes/calendario(tipo='muestra', lunes=${lunesActual})}"
                   th:classappend="${tipoActual == 'muestra' ? 'active' : ''}"
                   class="btn btn-outline-primary">Ver Muestras</a>
            </div>
        </div>
    </div>

    <div class="kanban-board">
        <div th:each="i : ${#numbers.sequence(0, 5)}"
             th:with="fechaDia=${lunesActual.plusDays(i)}"
             class="kanban-col">

            <div class="day-header d-flex justify-content-between align-items-center">
                <div>
                    <span class="d-block h6 mb-0 text-uppercase fw-bold text-secondary small"
                        th:text="|${#temporals.format(fechaDia, 'EEEE', 'es')} - ${#temporals.format(fechaDia, 'dd/MM')}|"></span>
                </div>
                <span class="badge rounded-pill bg-primary"
                      th:if="${datos.get(fechaDia) != null}"
                      th:text="${datos.get(fechaDia).size()}"></span>
            </div>

            <div class="cards-container">
                <div th:each="orden : ${datos.get(fechaDia)}"
                     class="order-card shadow-sm">

                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <span class="fw-bold small" th:text="'#' + ${orden.id} + ' - ' + ${#strings.toUpperCase(orden.items[0].producto.nombre)}"></span>
                    </div>
                    <hr>
                    <div class="mb-3">
                        <small class="badge small "
                               th:with="estado=${#strings.toLowerCase(orden.estadoOrden.estadoDeOrden)}"
                               th:classappend="${estado == 'sin hacer' ? 'bg-warning text-dark' :
                                    (estado == 'en proceso' ? 'bg-primary' :
                                    (estado == 'corregir' ? 'bg-danger' :
                                    (estado == 'lista para retirar' ? 'bg-success' : 'bg-secondary')))}"
                               th:text="${orden.estadoOrden.estadoDeOrden}">
                        </small>
                    </div>

                    <div class="small text-muted mb-2" th:if="${orden.fechaMuestra}">
                        <i class="bi bi-calendar-x"></i> Muestra:
                        <span th:text="${#temporals.format(orden.fechaMuestra, 'dd/MM/yyyy')}"></span>
                    </div>

                    <div class="small text-muted mb-2">
                        <i class="bi bi-calendar-check"></i> Entrega:
                        <span th:text="${#temporals.format(orden.fechaEntrega, 'dd/MM/yyyy')}"></span>
                        <span th:if="${orden.horaEntrega != null}" th:text="|, ${orden.horaEntrega} hs.|"></span>
                    </div>

                    <div th:if="${orden.items != null && !orden.items.isEmpty() && orden.items.?[conAdicionalDisenio].size() > 0}"
                         class="bg-success-subtle text-success p-1 rounded small mt-2 mb-2 text-center border border-success-subtle">
                        <i class="bi bi-brush"></i> <strong>REQUIERE DISEÑO</strong>
                    </div>

                </div>

                <div th:if="${datos.get(fechaDia) == null || datos.get(fechaDia).isEmpty()}"
                     class="text-center py-5 text-muted opacity-50">
                    <i class="bi bi-calendar-check d-block h3"></i>
                    <small>Día libre</small>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
