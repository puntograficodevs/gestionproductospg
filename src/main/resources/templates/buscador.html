<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" th:href="@{/css/root.css}"/>
  <link rel="stylesheet" th:href="@{/css/buscador.css}"/>
  <link rel="stylesheet" th:href="@{/css/listado.css}"/>
  <link rel="stylesheet" th:href="@{/css/exito.css}"/>
  <title>Buscador - Punto Gráfico</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container-fluid contenedor-pagina-en-proceso">
  <div class="row pagina-en-proceso mt-3 mb-3">
    <form class="d-flex" method="post" th:action="@{/buscar-orden}">
      <input class="form-control me-2" name="datoOrden" type="search" placeholder="Ingresá el número de orden, nombre del cliente o número de teléfono" aria-label="Search">
      <button class="btn btn-success btn-lupa" type="submit">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
        </svg>
      </button>
    </form>

    <div class="container mt-4">
      <h4 class="titulo-tabla-ordenes mb-4">Ordenes encontradas</h4>

      <div th:if="${#lists.isEmpty(ordenesEncontradas) and param.datoOrden != null}" class="alert alert-danger">
        No se encontraron órdenes con el dato <span th:text="${param.datoOrden[0]}"></span>.
      </div>

      <div th:if="${#lists.isEmpty(ordenesEncontradas) and param.datoOrden == null}" class="alert alert-success">
        Acá aparecerán todas las órdenes que coincidan total o parcialmente con tu búsqueda.
      </div>

      <div th:if="${!#lists.isEmpty(ordenesEncontradas)}" class="table-responsive">
        <button th:if="${empleado.rol.id == 1 or empleado.rol.id == 2}" id="btn-eliminar-masivo" class="btn btn-danger btn-sm mb-3" style="display: none;" onclick="eliminarSeleccionados()">
          Eliminar seleccionadas (<span id="cantSeleccionadas">0</span>)
        </button>
        <table class="table table-striped">
          <thead>
          <tr>
            <th style="width: 40px;" th:if="${empleado.rol.id == 1 or empleado.rol.id == 2}">
              <input type="checkbox" id="checkbox-seleccionar-todas-las-ordenes">
            </th>
            <th>N° de Orden</th>
            <th>Cliente</th>
            <th>Teléfono</th>
            <th>Producto</th>
            <th>Entrega</th>
            <th>Estado</th>
            <th>Pago</th>
            <th>Acciones</th>
          </tr>
          </thead>
          <tbody>
          <tr th:each="orden : ${ordenesEncontradas}">
            <td th:if="${empleado.rol.id == 1 or empleado.rol.id == 2}">
              <input type="checkbox" class="checkbox-seleccionar-orden" th:value="${orden.id}">
            </td>
            <td th:text="${orden.id}"></td>
            <td th:text="${orden.nombreCliente}"></td>
            <td th:text="${orden.telefonoCliente}"></td>
            <td th:text="${orden.items != null and !#lists.isEmpty(orden.items) ? orden.items[0].producto.nombre : 'Sin producto'}" class="capitalize"></td>
            <td th:text="${#temporals.format(orden.fechaEntrega, 'dd/MM/yyyy')}"></td>
            <td th:text="${orden.estadoOrden.estadoDeOrden}"></td>
            <td th:text="${orden.estadoPago.estadoDePago}"></td>
            <td>
              <button class="btn btn-primary btn-sm btn-buscador ver-btn-buscador"
                      th:onclick="'verDetalle(' + ${orden.id} + ')'"
                      title="Ver detalle">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ffffff" class="bi bi-eye" viewBox="0 0 16 16">
                  <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                  <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                </svg>
              </button>
              <button class="btn btn-secondary btn-sm btn-buscador btn-ver-historial"
                      th:data-idorden="${orden.id}"
                      title="Ver historial">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ffffff" class="bi bi-clock-history" viewBox="0 0 16 16">
                  <path d="M8.515 1.019A7 7 0 0 0 8 1V0a8 8 0 0 1 .589.022zm2.004.45a7 7 0 0 0-.985-.299l.219-.976q.576.129 1.126.342zm1.37.71a7 7 0 0 0-.439-.27l.493-.87a8 8 0 0 1 .979.654l-.615.789a7 7 0 0 0-.418-.302zm1.834 1.79a7 7 0 0 0-.653-.796l.724-.69q.406.429.747.91zm.744 1.352a7 7 0 0 0-.214-.468l.893-.45a8 8 0 0 1 .45 1.088l-.95.313a7 7 0 0 0-.179-.483m.53 2.507a7 7 0 0 0-.1-1.025l.985-.17q.1.58.116 1.17zm-.131 1.538q.05-.254.081-.51l.993.123a8 8 0 0 1-.23 1.155l-.964-.267q.069-.247.12-.501m-.952 2.379q.276-.436.486-.908l.914.405q-.24.54-.555 1.038zm-.964 1.205q.183-.183.35-.378l.758.653a8 8 0 0 1-.401.432z"/>
                  <path d="M8 1a7 7 0 1 0 4.95 11.95l.707.707A8.001 8.001 0 1 1 8 0z"/>
                  <path d="M7.5 3a.5.5 0 0 1 .5.5v5.21l3.248 1.856a.5.5 0 0 1-.496.868l-3.5-2A.5.5 0 0 1 7 9V3.5a.5.5 0 0 1 .5-.5"/>
                </svg>
              </button>
              <a th:href="@{'/ordenes/editar-orden/' + ${orden.id}}" th:if="${empleado.rol.id == 1 or empleado.rol.id == 2}"
                 class="btn btn-warning btn-sm btn-buscador editar-btn"
                 title="Editar orden">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ffffff" class="bi bi-pencil-square" viewBox="0 0 16 16">
                  <path d="M15.502 1.94a.5.5 0 0 1 0 .706L14.459 3.69l-2-2L13.502.646a.5.5 0 0 1 .707 0l1.293 1.293zm-1.75 2.456-2-2L4.939 9.21a.5.5 0 0 0-.121.196l-.805 2.414a.25.25 0 0 0 .316.316l2.414-.805a.5.5 0 0 0 .196-.12l6.813-6.814z"/>
                  <path fill-rule="evenodd" d="M1 13.5A1.5 1.5 0 0 0 2.5 15h11a1.5 1.5 0 0 0 1.5-1.5v-6a.5.5 0 0 0-1 0v6a.5.5 0 0 1-.5.5h-11a.5.5 0 0 1-.5-.5v-11a.5.5 0 0 1 .5-.5H9a.5.5 0 0 0 0-1H2.5A1.5 1.5 0 0 0 1 2.5z"/>
                </svg>
              </a>
              <button class="btn btn-danger btn-sm btn-buscador eliminar-btn" th:if="${empleado.rol.id == 1 or empleado.rol.id == 2}"
                      th:onclick="'confirmarEliminar(' + ${orden.id} + ')'"
                      title="Eliminar orden">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#ffffff" class="bi bi-trash" viewBox="0 0 16 16">
                  <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                  <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                </svg>
              </button>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="ordenModal" tabindex="-1" aria-labelledby="ordenModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="ordenModalLabel">Detalle de la Orden</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body" id="modalBody">
      </div>
      <div class="modal-footer border-top-0 pt-0" id="modalFooter"></div>
    </div>
  </div>
</div>

<div class="modal fade" id="modalHistorialMovimientos" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-historial">
    <div class="modal-content" id="contenidoModalHistorial"></div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/buscador.js}"></script>
<script th:src="@{/js/listado.js}"></script>
<script th:src="@{/js/exito.js}"></script>

</body>
</html>
