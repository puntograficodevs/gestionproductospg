<div th:fragment="cargar-pago(orden, listaMediosDePago)"
     class="modal fade"
     th:id="'modalCargarPago-' + ${orden.id}"
     tabindex="-1"
     aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <form th:action="@{/ordenes/registrar-pago}" method="post">
                <div class="modal-header">
                    <h6 class="modal-title">Cargar Pago - Orden #<span th:text="${orden.id}"></span></h6>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-start">
                    <input type="hidden" name="ordenId" th:value="${orden.id}">
                    <input type="hidden" name="desdeModal" th:value="${param.esModal != null}">
                    <div class="mb-4 bg-warning-subtle border border-danger-subtle rounded p-2">
                        <h5 class="d-flex justify-content-center align-items-center mb-0 fw-bold text-danger">
                            Restante: $<span th:text="${orden.total - orden.abonado}"></span>
                        </h5>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold">Monto a cobrar ($):</label>
                        <input type="number" name="importe" class="form-control form-control-lg"
                               placeholder="Ej: 2500" required min="1" step="1">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Medio de pago:</label>
                        <div class="bg-light p-3 border rounded">
                            <div th:each="medio : ${listaMediosDePago}" class="form-check mb-2">
                                <input class="form-check-input" type="radio" name="idMedioPago"
                                       th:id="'medio-' + ${orden.id} + '-' + ${medio.id}"
                                       th:value="${medio.id}" required>
                                <label class="form-check-label"
                                       th:for="'medio-' + ${orden.id} + '-' + ${medio.id}"
                                       th:text="${medio.medioDePago}">
                                </label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="submit" class="btn btn-success px-4">Registrar Pago</button>
                </div>
            </form>
        </div>
    </div>
</div>
