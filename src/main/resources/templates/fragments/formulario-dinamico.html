<div th:fragment="cuerpo-formulario" xmlns:th="http://www.w3.org/1999/xhtml">
    <div class="container mt-4">
        <h2 th:text="${orden.id != null ? 'Editar orden #' + orden.id + ' - ' + producto.nombre : 'Crear orden - ' + producto.nombre}"></h2>
    </div>

    <form th:action="@{/ordenes/guardar-orden}" method="post" th:object="${orden}" id="formOrden">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" name="productoId" id="currentProductoId" th:value="${producto.id}">
        <input type="hidden" th:name="'empleado.id'" th:value="${empleado.id}">

        <div class="row" th:if="${orden.correccion != null && orden.correccion != ''}">
            <div class="col-12">
                <div class="card mb-3 border contenedor-datos-orden-impresion contenedor-correccion-odt">
                    <h6 class="titulo-correccion">Corrección pendiente</h6>
                    <hr class="divider">
                    <p class="texto-correccion" th:text="${orden.correccion}"></p>
                </div>
            </div>
        </div>

        <div class="contenedor-datos-odt">
            <h5 class="mt-4 datos-del-cliente">Datos del Cliente</h5>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre del cliente *</label>
                    <input type="text" class="form-control" th:field="*{nombreCliente}" placeholder="Ej: Juan Pérez" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Teléfono *</label>
                    <input type="number" class="form-control" th:field="*{telefonoCliente}" placeholder="2804112233" required>
                </div>
                <div class="col-md-2 d-flex align-items-end" th:unless="${producto.id == 33}">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" th:field="*{esCuentaCorriente}" id="esCC">
                        <label class="form-check-label" for="esCC">¿CC?</label>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">Fecha de entrega *</label>
                    <input type="date" class="form-control" th:field="*{fechaEntrega}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Hora de entrega *</label>
                    <input type="text" class="form-control" th:field="*{horaEntrega}" placeholder="Ej: 18:00" required>
                </div>
                <div class="col-md-2 d-flex align-items-end" th:unless="${producto.id == 33}">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="checkMuestra" th:checked="${orden.fechaMuestra != null}">
                        <label class="form-check-label" for="checkMuestra">¿Muestra?</label>
                    </div>
                </div>
            </div>

            <div class="row mb-3" th:classappend="${orden.fechaMuestra == null ? 'd-none' : ''}" id="filaFechaMuestra">
                <div class="col-md-6">
                    <label class="form-label">Fecha de muestra</label>
                    <input type="date" class="form-control" th:field="*{fechaMuestra}">
                </div>
            </div>
        </div>

        <div class="contenedor-datos-odt">
            <h5 class="mt-4 datos-del-producto">Productos de la Orden</h5>
            <div id="lista-items-productos">
                <th:block th:if="${orden.id == null}">
                    <div th:replace="~{:: bloque-item-card(index=0)}"></div>
                </th:block>

                <th:block th:if="${orden.id != null}" th:each="item, stat : ${orden.items}">
                    <div th:replace="~{:: bloque-item-card(index=${stat.index})}"></div>
                </th:block>
            </div>

            <div class="d-grid mt-2">
                <button type="button" id="btn-agregar-otro"
                        th:classappend="${orden.id != null ? '' : 'd-none'}"
                        class="btn btn-outline-primary" onclick="duplicarItemActual()">
                    + Agregar otro <span th:text="${producto.nombre}"></span>
                </button>
            </div>
        </div>

        <div class="contenedor-datos-odt">
            <input type="hidden" id="precioDisenioBase" th:value="${producto.precioDisenio}">
            <h5 class="mt-4 datos-de-pago">Datos de Pago</h5>

            <div class="row mb-3">
                <div class="col-md-12">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="checkFactura" th:field="*{necesitaFactura}">
                        <label class="form-check-label" for="checkFactura">¿Necesita factura?</label>
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">Subtotal producto *</label>
                    <input type="number" class="form-control" id="inputPrecioProd" name="subtotal"
                           th:value="${orden.subtotal}" placeholder="0" readonly>
                </div>
                <div class="col-md-4" th:unless="${producto.id == 34 or producto.id == 35}">
                    <label class="form-label">Precio diseño</label>
                    <input type="number" class="form-control" id="inputPrecioDisenio" name="precioDisenio"
                           th:value="${orden.precioDisenio}" placeholder="0" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Precio impuestos</label>
                    <input type="number" class="form-control" id="inputPrecioImpuestos" value="0" readonly>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label fw-bold">Total *</label>
                    <input type="number" class="form-control fw-bold bg-warning-subtle" th:field="*{total}" id="inputTotal" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label text-success fw-bold">Abonado *</label>
                    <input type="number" class="form-control border-success" th:field="*{abonado}" id="inputAbonado">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Resta</label>
                    <input type="number" class="form-control bg-danger-subtle" id="inputResta" readonly>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-md-12">
                    <label class="form-label d-block">Medio de pago *</label>
                    <div class="d-flex flex-wrap gap-3">
                        <div th:each="medio : ${listaMediosDePago}" class="form-check mx-3">
                            <input type="radio" name="idMedioPago" class="form-check-input input-medio-pago"
                                   th:id="'medio-' + ${medio.id}"
                                   th:value="${medio.id}"
                                   th:checked="${orden.pagos != null and !orden.pagos.isEmpty() and orden.pagos[orden.pagos.size() - 1].medioPago.id == medio.id}">
                            <label class="form-check-label" th:for="'medio-' + ${medio.id}" th:text="${medio.medioDePago}"></label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="d-flex justify-content-center mt-4 mb-5">
            <button type="submit" id="btnGuardar" class="btn btn-crear-odt text-white px-5 py-2">
                <span th:text="${orden.id != null ? 'Guardar cambios' : 'Crear orden'}"></span>
            </button>
        </div>
    </form>
</div>

<div th:fragment="bloque-item-card(index)" class="card mb-3 item-producto"
     th:data-index="${index}"
     th:with="mapaDetalles=${orden.id != null && orden.items != null && orden.items.size() > index ? orden.items[index].getDetallesMap() : null}">

    <div class="card-header bg-light d-flex justify-content-between align-items-center"
         role="button" data-bs-toggle="collapse" th:data-bs-target="'#collapse-' + ${index}">
        <span class="fw-bold titulo-item" th:text="${producto.nombre}"></span>
        <i class="bi bi-chevron-down"></i>
    </div>

    <div th:id="'collapse-' + ${index}" class="collapse show">
        <div class="card-body bg-white">
            <div th:if="${producto.id == 34}" class="seccion-copia-escolar mb-4">
                <h6 class="fw-bold">Filtrar por...</h6>
                <div class="row g-2 mb-3">
                    <div class="col-md-6">
                        <select class="form-select filtro-escolar" data-campo="escuela" th:id="'escuela-' + ${index}">
                            <option value="">Escuela (Todas)</option>
                            <option th:each="opt : ${campos.?[name == 'escuela'][0].opciones}" th:value="${opt}" th:text="${opt}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <select class="form-select filtro-escolar" data-campo="docente" th:id="'docente-' + ${index}">
                            <option value="">Docente (Todos)</option>
                            <option th:each="opt : ${campos.?[name == 'docente'][0].opciones}" th:value="${opt}" th:text="${opt}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mt-2">
                        <select class="form-select filtro-escolar" data-campo="anio" th:id="'anio-' + ${index}">
                            <option value="">Año (Todos)</option>
                            <option th:each="opt : ${campos.?[name == 'anio'][0].opciones}" th:value="${opt}" th:text="${opt}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mt-2">
                        <select class="form-select filtro-escolar" data-campo="materia" th:id="'materia-' + ${index}">
                            <option value="">Materia (Todas)</option>
                            <option th:each="opt : ${campos.?[name == 'materia'][0].opciones}" th:value="${opt}" th:text="${opt}"></option>
                        </select>
                    </div>
                    <div class="col-md-4 mt-2">
                        <select class="form-select filtro-escolar" data-campo="orientacion" th:id="'orientacion-' + ${index}">
                            <option value="">Orientación (Todas)</option>
                            <option th:each="opt : ${campos.?[name == 'orientacion'][0].opciones}" th:value="${opt}" th:text="${opt}"></option>
                        </select>
                    </div>
                </div>
                <div class="row mb-3">
                    <div class="col-12">
                        <label class="form-label fw-bold">Material</label>

                        <input type="hidden" class="input-material-guardado" th:value="${mapaDetalles != null ? mapaDetalles['nombre_negocio'] : ''}">

                        <select class="form-select selector-material-final"
                                th:id="'material-' + ${index}"
                                th:name="'items[' + ${index} + '].detalles[nombre_negocio]'">
                            <option value="">-- Seleccione un material --</option>
                            <th:block th:each="mat : ${listaMateriales}">
                                <option th:value="${mat.nombreNegocio}"
                                        th:text="${mat.nombreNegocio}"
                                        th:attr="data-precio=${mat.precio}, data-detalles=${mat.detallesProducto}"
                                        th:selected="${mapaDetalles != null and mapaDetalles['nombre_negocio'] == mat.nombreNegocio}">
                                </option>
                            </th:block>
                        </select>
                    </div>
                </div>

                <hr class="my-4">
                <h6 class="fw-bold">Detalles del producto</h6>
            </div>

            <div class="row contenedor-dinamico-item"
                 th:with="mapaDetalles=${orden.id != null && orden.items != null && orden.items.size() > index ? orden.items[index].getDetallesMap() : null}">

                <div th:each="campo : ${campos}" class="col-md-12 mb-3 bloque-campo"
                     th:if="${producto.id != 34 or
                        (campo.name != 'escuela' and
                         campo.name != 'docente' and
                         campo.name != 'anio' and
                         campo.name != 'materia' and
                         campo.name != 'orientacion')}"
                     th:data-depends-on="${campo['dependsOn']}"
                     th:data-show-if="${campo['showIf']}"
                     th:style="${campo['dependsOn'] != null ? 'display: none;' : ''}">

                    <label th:if="${campo['tipo'] != 'checkbox'}" class="form-label" th:text="${campo['label']}"></label>

                    <div th:switch="${campo['tipo']}">
                        <input th:case="'text'" type="text" class="form-control input-dinamico"
                               th:name="'items[' + ${index} + '].detalles[' + ${campo['name']} + ']'"
                               th:placeholder="${campo['placeholder']}"
                               th:value="${mapaDetalles != null ? mapaDetalles[campo['name']] : ''}">

                        <input th:case="'number'" type="number" class="form-control input-dinamico"
                               th:name="'items[' + ${index} + '].detalles[' + ${campo['name']} + ']'"
                               th:placeholder="${campo['placeholder']}"
                               th:value="${mapaDetalles != null ? mapaDetalles[campo['name']] : ''}">

                        <div th:case="'select'" class="d-flex flex-wrap gap-3 p-2 border rounded bg-light">
                            <div th:each="opt : ${campo['opciones']}" class="form-check">
                                <input type="radio" class="form-check-input input-dinamico"
                                       th:name="'items[' + ${index} + '].detalles[' + ${campo['name']} + ']'"
                                       th:id="'radio-' + ${index} + '-' + ${campo['name']} + '-' + ${opt}"
                                       th:value="${opt}"
                                       th:checked="${mapaDetalles != null && mapaDetalles[campo['name']] == opt}">
                                <label class="form-check-label" th:for="'radio-' + ${index} + '-' + ${campo['name']} + '-' + ${opt}" th:text="${opt}"></label>
                            </div>
                        </div>

                        <div th:case="'checkbox'" class="form-check">
                            <input type="checkbox" class="form-check-input input-dinamico"
                                   th:name="'items[' + ${index} + '].detalles[' + ${campo['name']} + ']'"
                                   th:checked="${mapaDetalles != null && mapaDetalles[campo['name']] == 'on'}">
                            <label class="form-check-label" th:text="${campo['label']}"></label>
                        </div>
                    </div>
                </div>

                <div class="col-md-12 mb-3"
                     th:id="'contenedor-cantidad-real-' + ${index}"
                     th:style="${#lists.isEmpty(campos.?[name == 'cantidad_producto']) ? 'display: block;' : 'display: none;'}">
                    <label class="form-label">Cantidad *</label>
                    <input type="number" class="form-control input-cantidad-real"
                           th:name="'items[' + ${index} + '].cantidad'"
                           th:value="${orden.id != null && orden.items.size() > index ? orden.items[index].cantidad : 1}" required>
                </div>

                <div class="col-md-12 border-top pt-3 mt-2 mb-3" th:unless="${producto.id == 34 or producto.id == 35}">
                    <div class="row align-items-end">
                        <div class="col-md-6" >
                            <div class="form-check mb-2">
                                <input class="form-check-input check-disenio-item" type="checkbox"
                                       th:name="'items[' + ${index} + '].conAdicionalDisenio'"
                                       th:id="'checkDis-' + ${index}"
                                       th:checked="${orden.id != null && orden.items.size() > index ? orden.items[index].conAdicionalDisenio : false}">
                                <label class="form-check-label fw-bold" th:for="'checkDis-' + ${index}">Adicional diseño</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Precio diseño ($)</label>
                            <input type="number" class="form-control input-disenio-item"
                                   th:name="'items[' + ${index} + '].precioDisenio'"
                                   th:value="${orden.id != null && orden.items.size() > index ? orden.items[index].precioDisenio : 0}" readonly>
                        </div>
                    </div>
                </div>

                <div class="col-md-12 mb-3">
                    <label class="form-label fw-bold">Precio del producto ($) *</label>
                    <input type="number" class="form-control input-precio-item" placeholder="0"
                           th:name="'items[' + ${index} + '].precioUnitario'"
                           th:value="${orden.id != null && orden.items.size() > index ? orden.items[index].precioUnitario : ''}" required>
                </div>
            </div>

            <div class="d-flex justify-content-end mt-2 gap-2">
                <button th:if="${index > 0}" type="button" class="btn btn-outline-danger" onclick="eliminarItem(this)">Eliminar</button>
                <button type="button" class="btn btn-success" th:onclick="'confirmarItem(' + ${index} + ')'">Confirmar</button>
            </div>
        </div>
    </div>
</div>
