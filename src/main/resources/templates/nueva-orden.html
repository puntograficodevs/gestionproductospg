<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/crear-orden.css}"/>
    <link rel="stylesheet" th:href="@{/css/crear-odt.css}"/>
    <title>Orden - Punto Gráfico</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div id="selector-productos" class="container-fluid contenedor-botones-creacion" th:if="${esEdicion == null}">

    <div class="row mx-auto justify-content-center align-items-center fila-botones-creacion">
        <div class="col-2 mb-3" th:each="p : ${productos}" th:if="${p.nombre != 'Sin categoria'}">
            <button class="btn boton-creacion w-100" th:onclick="'seleccionarProducto(' + ${p.id} + ')'">
                <div th:utext="${p.iconoSvg}"></div>
                <span th:text="${#strings.toUpperCase(p.nombre)}"></span>
            </button>
        </div>
    </div>

    <div class="row mx-auto justify-content-center fila-botones-creacion mt-4">
        <div class="col-2" th:each="p : ${productos}" th:if="${p.nombre == 'Sin categoria'}">
            <button class="btn boton-creacion w-100" th:onclick="'seleccionarProducto(' + ${p.id} + ')'">
                <div th:utext="${p.iconoSvg}"></div>
                <span th:text="${#strings.toUpperCase(p.nombre)}"></span>
            </button>
        </div>
    </div>
</div>

<div id="contenedor-formulario-dinamico"
     th:class="${esEdicion != null ? 'container' : 'container d-none'}">

    <div th:if="${esEdicion != null}">
        <div th:replace="fragments/formulario-dinamico :: cuerpo-formulario"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/nueva-orden.js}"></script>

</body>
</html>
