<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" th:href="@{/css/home.css}"/>
    <link rel="stylesheet" th:href="@{/css/crear-orden.css}"/>
    <link rel="stylesheet" th:href="@{/css/crear-odt.css}"/>
    <title>Orden - Punto Gráfico</title>
</head>
<body>
    <div th:replace="fragments/navbar :: navbar"></div>

    <div id="selector-productos" class="container-fluid contenedor-botones-creacion">
        <div class="row mx-auto justify-content-center align-items-center fila-botones-creacion">
            <div class="col-2" th:each="p : ${productos}">
                <button class="btn boton-creacion w-100" th:onclick="'seleccionarProducto(' + ${p.id} + ')'">
                    <div th:utext="${p.iconoSvg}"></div>
                    <span th:text="${#strings.toUpperCase(p.nombre)}"></span>
                </button>
            </div>
        </div>
    </div>

    <div id="contenedor-formulario-dinamico" class="container d-none">
    </div>

    <script>
        function seleccionarProducto(id) {
            const contenedor = document.getElementById('contenedor-formulario-dinamico');
            fetch(`/ordenes/formulario-producto/${id}`)
                .then(response => response.text())
                .then(html => {
                    contenedor.innerHTML = html;
                    document.getElementById('selector-productos').classList.add('d-none');
                    contenedor.classList.remove('d-none');

                    inicializarLogicaCondicional();
                    recalcular();
                })
                .catch(error => console.error('Error:', error));
        }

        // 1. Escucha cambios de tipeo
        document.addEventListener('input', function (e) {
            if (['inputPrecioProd', 'inputPrecioDisenio', 'inputAbonado'].includes(e.target.id)) {
                recalcular();
            }
        });

        // 2. Escucha cambios de selección
        document.addEventListener('change', function (e) {
            const id = e.target.id;
            const name = e.target.name;

            if (['checkDisenio', 'checkFactura', 'checkMuestra', 'esCC'].includes(id) || name === 'idMedioPago') {
                if (id === 'checkMuestra') {
                    const fila = document.getElementById('filaFechaMuestra');
                    if (fila) fila.classList.toggle('d-none', !e.target.checked);
                }
                recalcular();
            }
        });

        function recalcular() {
            const pProd = document.getElementById('inputPrecioProd');
            const pDis = document.getElementById('inputPrecioDisenio');
            const pImp = document.getElementById('inputPrecioImpuestos');
            const total = document.getElementById('inputTotal');
            const abonado = document.getElementById('inputAbonado');
            const resta = document.getElementById('inputResta');
            const cDis = document.getElementById('checkDisenio');
            const cFac = document.getElementById('checkFactura');
            const pBaseHidden = document.getElementById('precioDisenioBase');
            const checkCC = document.getElementById('esCC');

            // Buscamos el botón por su clase si no tiene ID,
            // pero te recomiendo ponerle id="btnGuardar" al <button type="submit">
            const btnGuardar = document.getElementById('btnGuardar') || document.querySelector('.btn-crear-odt');

            if (!pProd || !pDis) return;

            // --- LÓGICA DE DISEÑO ---
            const vProd = parseFloat(pProd.value) || 0;
            const vBaseFija = pBaseHidden ? parseFloat(pBaseHidden.value) : 0;

            if (cDis && cDis.checked) {
                if (vBaseFija > 0) {
                    pDis.value = Math.ceil(vBaseFija);
                    pDis.readOnly = true;
                } else {
                    if (parseFloat(pDis.value) === 0 || pDis.readOnly) {
                        pDis.value = Math.ceil(vProd * 0.10);
                    }
                    pDis.readOnly = false;
                }
            } else {
                pDis.value = 0;
                pDis.readOnly = false;
            }

            const vDis = parseFloat(pDis.value) || 0;
            const subtotalBase = vProd + vDis;

            // --- IMPUESTOS EN CASCADA ---
            let acumuladorImpuestos = 0;
            let totalCorriendo = subtotalBase;

            if (cFac && cFac.checked) {
                const iva = subtotalBase * 0.21;
                acumuladorImpuestos += iva;
                totalCorriendo += iva;
            }

            const radioSeleccionado = document.querySelector('input[name="idMedioPago"]:checked');
            if (radioSeleccionado && parseInt(radioSeleccionado.value) === 2) {
                const recargo = totalCorriendo * 0.10;
                acumuladorImpuestos += recargo;
                totalCorriendo += recargo;
            }

            // --- ASIGNACIÓN CON REDONDEO ---
            const totalFinal = Math.ceil(totalCorriendo);
            pImp.value = Math.ceil(acumuladorImpuestos);
            if (total) total.value = totalFinal;

            const vAbo = parseFloat(abonado.value) || 0;
            const vResta = totalFinal - vAbo;
            if (resta) resta.value = Math.ceil(vResta);

            // --- VALIDACIÓN DE BOTÓN (DISABLED) ---
            // Si NO es cuenta corriente, el abonado debe ser >= 50% del total
            if (checkCC && !checkCC.checked) {
                const minSena = totalFinal / 2;
                if (vAbo < minSena && totalFinal > 0) {
                    btnGuardar.disabled = true;
                    abonado.classList.add('border-danger'); // Feedback visual simple
                } else {
                    btnGuardar.disabled = false;
                    abonado.classList.remove('border-danger');
                }
            } else {
                // Si es CC, se puede crear con cualquier monto de abono
                btnGuardar.disabled = false;
                abonado.classList.remove('border-danger');
            }
        }

        function inicializarLogicaCondicional() {
            const contenedor = document.getElementById('contenedor-dinamico');
            if (!contenedor) return;

            contenedor.addEventListener('input', function(e) {
                if (e.target.classList.contains('input-dinamico')) {
                    const nombreCampoPadre = e.target.name.replace('detalles[', '').replace(']', '');
                    const valorSeleccionado = e.target.value.trim();

                    document.querySelectorAll(`[data-depends-on="${nombreCampoPadre}"]`).forEach(bloqueHijo => {
                        const valorRequerido = bloqueHijo.getAttribute('data-show-if');
                        if (valorSeleccionado === valorRequerido) {
                            bloqueHijo.style.display = 'block';
                        } else {
                            bloqueHijo.style.display = 'none';
                            const inputHijo = bloqueHijo.querySelector('.input-dinamico');
                            if (inputHijo) inputHijo.value = '';
                        }
                    });
                }
            });
        }
    </script>
</body>
</html>
