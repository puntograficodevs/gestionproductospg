<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/root.css}"/>
    <link rel="stylesheet" th:href="@{/css/nueva-orden.css}"/>
    <title>Orden - Punto Gráfico</title>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div id="selector-productos" class="container contenedor-botones-creacion" th:if="${esEdicion == null}">

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3 justify-content-center fila-botones-creacion">

        <div class="col d-flex" th:each="p : ${productos}" th:if="${p.nombre != 'Sin categoria' and p.id != 33}">

            <button class="btn boton-creacion w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                    th:onclick="'seleccionarProducto(' + ${p.id} + ')'">
                <div class="icono-svg" th:utext="${p.iconoSvg}"></div>
                <span th:text="${#strings.toUpperCase(p.nombre)}"></span>
            </button>
        </div>
    </div>

    <div class="row row-cols-2 row-cols-md-3 row-cols-lg-5 g-3 justify-content-center fila-botones-creacion mt-2">
        <div class="col d-flex" th:each="p : ${productos}" th:if="${p.nombre == 'Sin categoria' and p.id != 33}">
            <button class="btn boton-creacion w-100 h-100 d-flex flex-column align-items-center justify-content-center"
                    th:onclick="'seleccionarProducto(' + ${p.id} + ')'">
                <div class="icono-svg" th:utext="${p.iconoSvg}"></div>
                <span th:text="${#strings.toUpperCase(p.nombre)}"></span>
            </button>
        </div>
    </div>
</div>

<div id="contenedor-formulario-dinamico"
     th:class="${esEdicion != null ? 'container' : 'container d-none'}">

    <div th:if="${esEdicion != null}">
        <div th:replace="fragments/formulario-dinamico :: cuerpo-formulario"></div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/nueva-orden.js}"></script>

</body>
</html>
