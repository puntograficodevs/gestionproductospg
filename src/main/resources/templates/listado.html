<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
  <link rel="stylesheet" th:href="@{/css/home.css}"/>
  <link rel="stylesheet" th:href="@{/css/listado.css}"/>
  <link rel="stylesheet" th:href="@{/css/mostrar-productos.css}"/>
  <title>Listado - Punto Gráfico</title>
  <style>
    body.con-filtro .tarjeta-orden {
      display: none;
    }
  </style>
</head>
<body th:classappend="${filtroSeleccionado != null and filtroSeleccionado != 'todas'} ? 'con-filtro' : ''">
<div th:replace="fragments/navbar :: navbar"></div>

<div class="contenido-pagina-listado">
  <div class="row contenedor-selector-producto justify-content-center align-items-center mt-3">
    <div class="col-md-4 text-end">
      <h3 class="titulo-filtro">Elegí qué órdenes quer&eacute;s ver:</h3>
    </div>
    <div class="col-md-6">
      <select class="form-select" id="selector-producto">
        <option value="todas" th:selected="${filtroSeleccionado == 'todas'}">Todas</option>
        <th:block th:each="producto : ${productos}">
          <option th:if="${empleado.rol.id != 5 or producto.nombre != 'Impresion'}"
                  th:value="${producto.nombre}"
                  th:text="${producto.nombre}"
                  th:selected="${filtroSeleccionado == producto.nombre}"> </option>
        </th:block>
      </select>
    </div>
  </div>

  <hr class="divider-listado">

  <div class="container-fluid contenedor-kanban-ordenes">
    <div class="row flex-nowrap overflow-auto">

      <th:block th:each="columna : ${ {'Sin Hacer', 'En Proceso', 'Lista para Retirar', 'Corregir'} }">
        <div th:class="'col-3 columna-' + ${#strings.toLowerCase(#strings.replace(columna, ' ', '-'))}">
          <div class="titulo-columna-contenedor"><p class="titulo-columna" th:text="${#strings.toUpperCase(columna)}"></p></div>

          <div th:with="listaOrdenes=${columna == 'Sin Hacer' ? ordenesSinHacer : (columna == 'En Proceso' ? ordenesEnProceso : (columna == 'Lista para Retirar' ? ordenesListaParaRetirar : ordenesCorregir))}">

            <div th:each="orden : ${listaOrdenes}" class="card mb-2 position-relative shadow-sm tarjeta-orden"
                 th:attr="data-producto=${orden.items != null and !#lists.isEmpty(orden.items) ? orden.items[0].producto.nombre : ''}">

              <button class="btn btn-primary btn-sm ver-btn" th:onclick="'verDetalle(' + ${orden.id} + ')'">VER</button>

              <div class="card-body">
                <b>
                  <p th:if="${orden.items != null and !#lists.isEmpty(orden.items)}"
                      class="fw-bold mb-0"
                      style="font-size: 0.75rem; letter-spacing: 1px;"
                     th:text="'#' + ${orden.id} + ' - ' + ${#strings.toUpperCase(orden.items[0].producto.nombre)}">
                  </p>
                  <hr class="divider mt-auto w-75 ms-0">
                </b>
                <ul class="mb-2 p-0" style="font-size: 0.85rem;">
                  <li><b>Cliente:</b> <span th:text="${orden.nombreCliente}"></span></li>
                  <li th:if="${orden.telefonoCliente != null and orden.telefonoCliente != ''}"><b>Tel:</b> <span th:text="${orden.telefonoCliente}"></span></li>
                  <li th:if="${orden.fechaMuestra != null}"><b>Muestra:</b> <span th:text="${orden.fechaMuestra}"></span></li>
                  <li><b>Fecha entrega:</b> <span th:text="${#temporals.format(orden.fechaEntrega, 'dd/MM/yyyy')}"></span></span></li>
                  <li th:if="${orden.horaEntrega != ''}"><b>Hora entrega: </b>
                    <span th:with="limpia=${orden.horaEntrega.replace(':', '').trim()},
                      h=${limpia.length() <= 2 ? limpia : (limpia.length() == 3 ? limpia.substring(0,1) : limpia.substring(0,2))},
                      m=${limpia.length() <= 2 ? '00' : (limpia.length() == 3 ? limpia.substring(1) : limpia.substring(2))}"
                      th:text="${(h.startsWith('0') && h.length() > 1 ? h.substring(1) : h) + ':' + m + ' hs.'}">
                    </span>
                  </li>
                  <li><b>Total: </b><span th:text="'$' + ${orden.total}"></span></li>
                </ul>

                <b th:if="${orden.total - orden.abonado != 0}">
                  <p class="falta-abonar mb-2">Falta: $<span th:text="${orden.total - orden.abonado}"></span></p>
                </b>

                <div class="row g-1">
                  <th:block th:if="${columna == 'Sin Hacer'}">
                    <div class="col-6">
                      <button class="btn btn-columna-sin-hacer btn-correccion btn-sm w-100" data-bs-toggle="modal" th:attr="data-bs-target='#modalEnviarACorregir-' + ${orden.id}">Corregir</button>
                    </div>
                    <div class="col-6">
                      <button class="btn btn-columna-sin-hacer btn-sm w-100 btn-cambio-estado" th:data-idorden="${orden.id}" data-accion="proceso">En proceso</button>
                    </div>
                  </th:block>

                  <th:block th:if="${columna == 'En Proceso'}">
                    <div class="col-6">
                      <button class="btn btn-sm w-100 btn-columna-en-proceso btn-cambio-estado" th:data-idorden="${orden.id}" data-accion="sin-hacer">Sin hacer</button>
                    </div>
                    <div class="col-6">
                      <button class="btn btn-sm w-100 btn-columna-en-proceso btn-cambio-estado" th:data-idorden="${orden.id}" data-accion="hecha">Hecha</button>
                    </div>
                  </th:block>

                  <th:block th:if="${columna == 'Lista para Retirar'}">
                    <div class="col-6">
                      <button class="btn btn-sm w-100 btn-columna-lista-para-retirar btn-cambio-estado" th:data-idorden="${orden.id}" data-accion="proceso">En proceso</button>
                    </div>
                    <div class="col-6">
                      <button class="btn btn-sm w-100 btn-columna-lista-para-retirar btn-cambio-estado" th:data-idorden="${orden.id}" th:data-resta="${orden.total - orden.abonado}" data-accion="entregado">Entregado</button>
                    </div>
                  </th:block>
                </div>

                <button th:if="${orden.total - orden.abonado != 0 and columna != 'Corregir'}"
                        class="btn btn-sm mt-2 w-100"
                        th:classappend="'btn-columna-' + ${#strings.toLowerCase(#strings.replace(columna, ' ', '-'))}"
                        data-bs-toggle="modal" th:attr="data-bs-target='#modalCargarPago-' + ${orden.id}">Cargar Pago</button>

                <div th:replace="fragments/cargar-pago :: cargar-pago(${orden}, ${listaMediosDePago})"></div>
                <div th:if="${columna == 'Sin Hacer'}" th:replace="fragments/enviar-a-corregir :: enviar-a-corregir(${orden.id})"></div>
              </div>
            </div>
          </div>
        </div>
      </th:block>

    </div>
  </div>

  <div class="modal fade" id="ordenModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Detalle de la Orden</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
        </div>
        <div class="modal-body" id="modalBody"></div>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/buscador.js}"></script>
<script th:src="@{/js/listado.js}"></script>

</body>
</html>
